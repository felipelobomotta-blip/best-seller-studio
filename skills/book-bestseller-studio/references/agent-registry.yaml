market_researcher:
  label: "Market Researcher"
  skill: "skills/book-researcher/SKILL.md"
  mission: "Map current category, comps, reader demand, taboo promises, metadata angles, and commercial white space before architecture hardens."
  timing: "Before Phase 1 and whenever market package changes."
  score_floor: "8.5 market evidence target"
  inputs:
    - "ASSUMPTIONS.md"
    - "artifacts/00-brief.md"
  outputs:
    - "research/market-research.md"
    - "research/comps.md"
    - "foundation/positioning.md"
  gates:
    - "At least 5 current comp candidates or explicit blocker."
    - "Target reader and reader promise stated in one sentence."
    - "Word-count and format expectations documented."
    - "No bestseller claim without evidence and launch math."

worldbuilder:
  label: "Worldbuilder"
  skill: "skills/series-architect/SKILL.md"
  mission: "Build world logic, institutions, rules, constraints, lore, setting economics, cultural pressure, and continuity bible without decorative encyclopedic bloat."
  timing: "Phase 1-2 for speculative, historical, thriller, mystery, series, or high-concept nonfiction frame."
  score_floor: "8.5 coherence target"
  inputs:
    - "ASSUMPTIONS.md"
    - "artifacts/00-brief.md"
    - "research/market-research.md"
  outputs:
    - "foundation/world-bible.md"
    - "foundation/continuity-rules.md"
  gates:
    - "Rules create story pressure, not only background."
    - "Every major rule has cost, exception, and dramatic use."
    - "Continuity contradictions get tickets before drafting."

character_architect:
  label: "Character Architect"
  skill: "skills/narrative-foundation/SKILL.md"
  mission: "Design protagonist, antagonist, supporting cast, wounds, desires, contradictions, voice-under-pressure, and relationship engines that can carry commercial emotional stakes."
  timing: "Phase 1 Foundation before outline lock."
  score_floor: "8.5 character/emotion target"
  inputs:
    - "ASSUMPTIONS.md"
    - "artifacts/00-brief.md"
    - "foundation/positioning.md"
  outputs:
    - "artifacts/03-characters.md"
    - "foundation/voice-map.md"
  gates:
    - "Every major character has conscious want, unconscious need, contradiction, and pressure voice."
    - "At least one relationship creates recurring commercial tension."
    - "Character promise matches target reader desire."

theme_engineer:
  label: "Theme Engineer"
  skill: "skills/narrative-foundation/SKILL.md"
  mission: "Turn theme into a live dramatic question, not a lecture. Build motif, emotional anchors, identity effect, and re-read architecture."
  timing: "Phase 1 Foundation and Phase 2 Architecture."
  score_floor: "8.5 theme/voice target"
  inputs:
    - "artifacts/00-brief.md"
    - "artifacts/03-characters.md"
    - "foundation/positioning.md"
  outputs:
    - "artifacts/04-theme.md"
    - "foundation/motif-map.md"
  gates:
    - "Theme stated as question, not answer."
    - "Each act changes reader understanding of the question."
    - "Motifs appear under pressure, not as decoration."

plot_architect:
  label: "Plot Architect"
  skill: "skills/narrative-foundation/SKILL.md"
  mission: "Design outline, reversals, act turns, open loops, reveals, escalation, payoff map, and ending promise with genre-fit commercial propulsion."
  timing: "Phase 2 Architecture."
  score_floor: "8.5 pacing/coherence target"
  inputs:
    - "artifacts/03-characters.md"
    - "artifacts/04-theme.md"
    - "foundation/world-bible.md"
    - "foundation/positioning.md"
  outputs:
    - "artifacts/05-outline.md"
    - "foundation/payoff-map.md"
  gates:
    - "Each chapter changes value state."
    - "Every setup has planned payoff or deliberate abandonment."
    - "Opening and ending satisfy same reader contract."

pacing_engineer:
  label: "Pacing Engineer"
  skill: "skills/prose-craft/SKILL.md"
  mission: "Tune scene length, chapter endings, acceleration/deceleration, skim resistance, abandon points, and first-10-pages commercial pressure."
  timing: "Phase 2 Architecture, Phase 3 Drafting, and post-swarm revision."
  score_floor: "8.5 pacing/opening target"
  inputs:
    - "artifacts/05-outline.md"
    - "artifacts/07-opening-strategy.md"
    - "manuscript/chapters"
  outputs:
    - "evaluations/pacing-report.md"
    - "revision/pacing-tickets.md"
  gates:
    - "First 10 pages force a clear reader contract."
    - "No two consecutive chapters end with same hook type."
    - "Every slow passage has emotional, clue, voice, or dread function."

prose_writer:
  label: "Prose Writer"
  skill: "skills/prose-craft/SKILL.md"
  mission: "Draft chapters with voice, scene pressure, subtext, sensory concreteness, imperfect human texture, and chapter-level hooks without optimizing to a score mid-sentence."
  timing: "Phase 3 Drafting."
  score_floor: "8.5 prose/voice target after revision"
  inputs:
    - "artifacts/05-outline.md"
    - "artifacts/06-emotional-curve.md"
    - "foundation/voice-map.md"
    - "foundation/world-bible.md"
  outputs:
    - "manuscript/chapters"
    - "manuscript/chapter-reports"
  gates:
    - "Chapter has concrete scene pressure and value shift."
    - "Voice changes under pressure."
    - "Dialogue carries subtext or conflict."
    - "No synthetic symmetry pass before drafting complete."

continuity_editor:
  label: "Continuity Editor"
  skill: "skills/manuscript-manager/SKILL.md"
  mission: "Track canon, timeline, facts, names, promises, clues, world rules, unresolved loops, and reader-contract debt."
  timing: "After every chapter block and before adversarial audit."
  score_floor: "8.5 coherence floor"
  inputs:
    - "foundation/continuity-rules.md"
    - "foundation/payoff-map.md"
    - "manuscript/chapters"
  outputs:
    - "evaluations/continuity-audit.md"
    - "revision/continuity-tickets.md"
  gates:
    - "No unresolved accidental contradiction."
    - "Every major open loop has status."
    - "Reader-contract debt marked before scoring."

swarm_director:
  label: "Swarm Director"
  skill: "skills/book-swarm-panel/SKILL.md"
  mission: "Run simulated reader swarms, public-opinion scenarios, niche-risk proxies, heatmaps, interviews, and revision tickets. Import MiroFish outputs when external MiroFish exists."
  timing: "After first full draft, after major act, or before package lock."
  score_floor: "8.5 calibrated audience signal target"
  inputs:
    - "foundation/positioning.md"
    - "manuscript/chapters"
    - "delivery/editorial-package.md"
  outputs:
    - "evaluations/book-swarm"
  gates:
    - "Raw enthusiasm calibrated down."
    - "Worst cohort and abandon points documented."
    - "Niche approval never claimed as real-world validation."
    - "Revision tickets actionable without rereading full report."

adversarial_auditor:
  label: "Adversarial Auditor"
  skill: "skills/book-genesis-codex/SKILL.md"
  mission: "Attack premise, structure, opening, pacing, coherence, market promise, AI texture, and score inflation before final score."
  timing: "Mandatory Phase 4."
  score_floor: "Blocks final score until audit complete"
  inputs:
    - "manuscript/chapters"
    - "evaluations/book-swarm"
    - "evaluations/continuity-audit.md"
  outputs:
    - "artifacts/08-adversarial-audit.md"
  gates:
    - "Final score cannot run before this output exists."
    - "Weakest dimension named."
    - "Score inflation risks documented."

revision_editor:
  label: "Revision Editor"
  skill: "skills/book-editor/SKILL.md"
  mission: "Apply structural, connective, prose-texture, and factual fixes against audit and swarm tickets without sanding off voice."
  timing: "After adversarial audit and before final score/package."
  score_floor: "8.5 weakest-dimension repair target"
  inputs:
    - "artifacts/08-adversarial-audit.md"
    - "evaluations/book-swarm"
    - "revision/pacing-tickets.md"
    - "revision/continuity-tickets.md"
    - "manuscript/chapters"
  outputs:
    - "revision/revision-plan.md"
    - "manuscript/chapters"
  gates:
    - "Fix weakest dimension before polishing strongest one."
    - "Preserve voice anchors and best scenes."
    - "Every BLOCK ticket resolved or explicitly deferred with reason."

scorekeeper:
  label: "Scorekeeper"
  skill: "skills/book-genesis-codex/references/scoring/genesis-score-codex.md"
  mission: "Score only after audit/revision, enforce 8.5+ target as calibrated threshold, and block publication claims when floor dimensions fail."
  timing: "Phase 5 Final Score."
  score_floor: "8.5 calibrated floor target"
  inputs:
    - "artifacts/08-adversarial-audit.md"
    - "evaluations/book-swarm"
    - "manuscript/chapters"
  outputs:
    - "artifacts/09-genesis-score-codex.md"
  gates:
    - "Weakest major dimension controls readiness."
    - "Average score cannot hide any floor below target."
    - "8.5+ claim requires evidence, calibration, and blocker review."

package_strategist:
  label: "Package Strategist"
  skill: "skills/editorial-package/SKILL.md"
  mission: "Build logline, cover copy, synopsis, query/pitch, cover brief, metadata angle, and viral hooks that match the manuscript instead of overpromising."
  timing: "Phase 6 and package-reaction loops."
  score_floor: "8.5 package/market target"
  inputs:
    - "artifacts/09-genesis-score-codex.md"
    - "foundation/positioning.md"
    - "evaluations/book-swarm"
  outputs:
    - "delivery/editorial-package.md"
    - "launch/viral-hooks.md"
  gates:
    - "Package promise matches first chapter."
    - "Hook is specific enough to spread."
    - "Backlash/misread risk documented."
    - "No bestseller guarantee language."

viral_framing_strategist:
  label: "Viral Framing Strategist"
  skill: "skills/book-bestseller-studio/SKILL.md"
  mission: "Design shareable premise frames, quote hooks, controversy boundaries, BookTok/Reddit/Goodreads angles, and public-reaction tests without confusing virality hypotheses with predictions."
  timing: "After package draft and before launch plan lock."
  score_floor: "8.5 shareability hypothesis target"
  inputs:
    - "delivery/editorial-package.md"
    - "evaluations/book-swarm"
    - "foundation/positioning.md"
  outputs:
    - "launch/viral-hooks.md"
    - "launch/virality-test-plan.md"
  gates:
    - "At least 10 specific shareable hooks, not generic slogans."
    - "Likely misread and backlash pattern documented."
    - "Every viral claim framed as testable hypothesis."
    - "Hook does not overpromise content not present in manuscript."

launch_strategist:
  label: "Launch Strategist"
  skill: "skills/book-bestseller-studio/SKILL.md"
  mission: "Turn market position into ARC/review plan, content angles, launch calendar, category assumptions, and virality tests."
  timing: "After package gate or before public launch."
  score_floor: "8.5 launch-fit target"
  inputs:
    - "delivery/editorial-package.md"
    - "launch/viral-hooks.md"
    - "launch/virality-test-plan.md"
    - "research/market-research.md"
  outputs:
    - "launch/launch-plan.md"
    - "launch/content-angles.md"
  gates:
    - "Audience acquisition path named."
    - "Review/ARC strategy documented."
    - "Viral tests are framed as hypotheses, not predictions."
    - "Launch math separated from manuscript quality."
