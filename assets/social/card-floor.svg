<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="100%" stop-color="#141937"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8884F"/>
      <stop offset="50%" stop-color="#E8C896"/>
      <stop offset="100%" stop-color="#B8884F"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid3" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#D4A574" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg3)"/>
  <rect width="1080" height="1080" fill="url(#grid3)"/>
  <ellipse cx="540" cy="600" rx="500" ry="400" fill="url(#glow3)"/>
  <rect x="60" y="60" width="960" height="960" fill="none" stroke="#D4A574" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Title -->
  <text x="540" y="160" font-family="Inter, Helvetica, sans-serif" font-size="20" letter-spacing="8" text-anchor="middle" fill="#D4A574">
    THE FLOOR PRINCIPLE
  </text>
  <text x="540" y="245" font-family="'Cormorant Garamond', Garamond, serif" font-weight="500" font-size="64" text-anchor="middle" fill="#F5F0E8">
    A book is only as strong as
  </text>
  <text x="540" y="320" font-family="'Cormorant Garamond', Garamond, serif" font-weight="500" font-style="italic" font-size="64" text-anchor="middle" fill="url(#gold3)">
    its weakest dimension.
  </text>

  <!-- 10 Dimensions wheel-like grid -->
  <g font-family="'Cormorant Garamond', Garamond, serif" font-size="36" text-anchor="middle" fill="#F5F0E8">
    <!-- Row 1 -->
    <text x="220" y="500">Originality</text>
    <text x="540" y="500">Theme</text>
    <text x="860" y="500">Characters</text>
    <!-- Row 2 -->
    <text x="220" y="600">Prose</text>
    <text x="540" y="600">Pacing</text>
    <text x="860" y="600">Emotion</text>
    <!-- Row 3 -->
    <text x="220" y="700">Coherence</text>
    <text x="540" y="700">Market</text>
    <text x="860" y="700">Voice</text>
    <!-- Row 4 (single, centered) -->
    <text x="540" y="800" fill="url(#gold3)" font-style="italic">Opening</text>
  </g>

  <!-- Decorative dots between -->
  <g fill="#D4A574" opacity="0.5">
    <circle cx="380" cy="490" r="2"/><circle cx="700" cy="490" r="2"/>
    <circle cx="380" cy="590" r="2"/><circle cx="700" cy="590" r="2"/>
    <circle cx="380" cy="690" r="2"/><circle cx="700" cy="690" r="2"/>
  </g>

  <!-- Bottom bar -->
  <line x1="200" y1="870" x2="880" y2="870" stroke="#D4A574" stroke-opacity="0.3" stroke-width="1"/>
  <text x="540" y="920" font-family="'Cormorant Garamond', Garamond, serif" font-style="italic" font-size="34" text-anchor="middle" fill="#F5F0E8">
    Brilliant prose does not save a broken opening.
  </text>
  <text x="540" y="985" font-family="Inter, Helvetica, sans-serif" font-size="16" letter-spacing="6" text-anchor="middle" fill="#D4A574">
    BOOK GENESIS · GENESIS SCORE · 10 DIMENSIONS
  </text>
</svg>
