<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="100%" stop-color="#141937"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8884F"/>
      <stop offset="50%" stop-color="#E8C896"/>
      <stop offset="100%" stop-color="#B8884F"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#D4A574" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>
  <circle cx="540" cy="540" r="500" fill="url(#glow)"/>

  <!-- Frame -->
  <rect x="60" y="60" width="960" height="960" fill="none" stroke="#D4A574" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="72" y="72" width="936" height="936" fill="none" stroke="#D4A574" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Top kicker -->
  <text x="540" y="180" font-family="Inter, Helvetica, sans-serif" font-size="22" letter-spacing="10" text-anchor="middle" fill="#D4A574">
    BOOK GENESIS
  </text>
  <line x1="380" y1="210" x2="700" y2="210" stroke="#D4A574" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Hero numbers -->
  <text x="540" y="430" font-family="'Cormorant Garamond', Garamond, serif" font-weight="500" font-size="160" text-anchor="middle" fill="#F5F0E8">
    Ten books.
  </text>
  <text x="540" y="600" font-family="'Cormorant Garamond', Garamond, serif" font-weight="500" font-size="160" text-anchor="middle" fill="#F5F0E8">
    Thirty days.
  </text>
  <text x="540" y="770" font-family="'Cormorant Garamond', Garamond, serif" font-weight="500" font-style="italic" font-size="160" text-anchor="middle" fill="url(#gold)">
    One pipeline.
  </text>

  <!-- Diamond divider -->
  <g transform="translate(540, 850)">
    <line x1="-160" y1="0" x2="-12" y2="0" stroke="#D4A574" stroke-opacity="0.5" stroke-width="1"/>
    <g transform="rotate(45)">
      <rect x="-7" y="-7" width="14" height="14" fill="none" stroke="#D4A574" stroke-width="1.5"/>
    </g>
    <line x1="12" y1="0" x2="160" y2="0" stroke="#D4A574" stroke-opacity="0.5" stroke-width="1"/>
  </g>

  <!-- Subline -->
  <text x="540" y="912" font-family="Inter, Helvetica, sans-serif" font-size="22" letter-spacing="2" text-anchor="middle" fill="#F5F0E8" opacity="0.85">
    An agent-agnostic AI book production pipeline.
  </text>
  <text x="540" y="950" font-family="Inter, Helvetica, sans-serif" font-size="18" letter-spacing="3" text-anchor="middle" fill="#D4A574" opacity="0.9">
    CLAUDE CODE · CODEX · ANTIGRAVITY · KIMI
  </text>
</svg>
