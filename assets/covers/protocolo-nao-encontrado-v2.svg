<?xml version="1.0" encoding="UTF-8"?>
<!--
  Protocolo Não Encontrado — KDP-compliant cover
  Trim: 6 × 9 in, with 0.125 in bleed = 6.125 × 9.25 in final
  Render at 300 DPI for KDP upload.

  Coordinate system: viewBox 0 0 1225 1850 (1 unit = 0.005 in = 1.5 px @ 300 DPI)
  Reference lines:
    - Bleed edge: 0,0 to 1225,1850
    - Trim line:  25,25 to 1200,1825
    - Safe zone:  100,100 to 1125,1750  ← all text MUST stay inside this
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1225 1850"
     width="6.125in" height="9.25in"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Background gradient: deep ink with subtle vertical fade -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0A0A0F"/>
      <stop offset="50%" stop-color="#06060A"/>
      <stop offset="100%" stop-color="#020204"/>
    </linearGradient>

    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- CRT scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="2" height="3" patternUnits="userSpaceOnUse">
      <rect width="2" height="3" fill="#0A0A0F"/>
      <rect width="2" height="1" fill="#FFFFFF" fill-opacity="0.015"/>
    </pattern>
  </defs>

  <!-- 1. Solid bleed background -->
  <rect width="1225" height="1850" fill="url(#bg)"/>
  <!-- 2. Scanline overlay -->
  <rect width="1225" height="1850" fill="url(#scanlines)"/>

  <!-- 3. Glitch slices — random horizontal displaced bands.
       Distributed across full bleed area, but artistic. -->
  <g opacity="0.85">
    <!-- Top cluster -->
    <rect x="0"   y="60"   width="1225" height="2"  fill="#FFFFFF" opacity="0.10"/>
    <rect x="180" y="68"   width="650"  height="3"  fill="#FFFFFF" opacity="0.18"/>
    <rect x="0"   y="90"   width="380"  height="2"  fill="#FFFFFF" opacity="0.08"/>
    <rect x="450" y="120"  width="700"  height="4"  fill="#FFFFFF" opacity="0.12"/>
    <rect x="0"   y="160"  width="1225" height="1"  fill="#FFFFFF" opacity="0.06"/>
    <rect x="220" y="195"  width="500"  height="3"  fill="#FFFFFF" opacity="0.10"/>
    <rect x="700" y="230"  width="450"  height="2"  fill="#FFFFFF" opacity="0.08"/>
    <rect x="0"   y="280"  width="380"  height="3"  fill="#FFFFFF" opacity="0.12"/>
    <rect x="500" y="335"  width="600"  height="2"  fill="#FFFFFF" opacity="0.07"/>
    <rect x="100" y="380"  width="900"  height="2"  fill="#FFFFFF" opacity="0.05"/>
    <rect x="0"   y="430"  width="280"  height="3"  fill="#FFFFFF" opacity="0.10"/>

    <!-- Mid cluster (lighter, behind title) -->
    <rect x="0"   y="500"  width="1225" height="1"  fill="#FFFFFF" opacity="0.04"/>
    <rect x="600" y="540"  width="500"  height="2"  fill="#FFFFFF" opacity="0.06"/>
    <rect x="0"   y="600"  width="350"  height="2"  fill="#FFFFFF" opacity="0.05"/>
    <rect x="800" y="660"  width="425"  height="3"  fill="#FFFFFF" opacity="0.08"/>

    <!-- Bottom cluster -->
    <rect x="0"   y="1240" width="1225" height="2"  fill="#FFFFFF" opacity="0.06"/>
    <rect x="200" y="1290" width="700"  height="3"  fill="#FFFFFF" opacity="0.10"/>
    <rect x="600" y="1340" width="625"  height="2"  fill="#FFFFFF" opacity="0.08"/>
    <rect x="0"   y="1395" width="450"  height="3"  fill="#FFFFFF" opacity="0.12"/>
    <rect x="500" y="1445" width="600"  height="2"  fill="#FFFFFF" opacity="0.07"/>
    <rect x="0"   y="1500" width="320"  height="2"  fill="#FFFFFF" opacity="0.10"/>
    <rect x="400" y="1555" width="800"  height="3"  fill="#FFFFFF" opacity="0.08"/>
    <rect x="0"   y="1605" width="1225" height="1"  fill="#FFFFFF" opacity="0.05"/>
    <rect x="700" y="1640" width="525"  height="3"  fill="#FFFFFF" opacity="0.12"/>
    <rect x="100" y="1690" width="600"  height="2"  fill="#FFFFFF" opacity="0.07"/>
    <rect x="0"   y="1750" width="380"  height="2"  fill="#FFFFFF" opacity="0.10"/>
    <rect x="500" y="1790" width="725"  height="2"  fill="#FFFFFF" opacity="0.06"/>
  </g>

  <!-- 4. Vignette -->
  <rect width="1225" height="1850" fill="url(#vignette)"/>

  <!-- ============================================================
       TEXT BLOCK — all positioned inside SAFE ZONE [100..1125] x [100..1750]
       ============================================================ -->

  <!-- 5. Top-right protocol code (was almost on the edge in v1) -->
  <text x="1125" y="180"
        font-family="'Courier New', Consolas, monospace"
        font-size="34"
        font-weight="700"
        text-anchor="end"
        fill="#FFFFFF"
        letter-spacing="3">
    PROTOCOLO N. 000.000/ERR
  </text>

  <!-- 6. Main title — PROTOCOLO NÃO ENCONTRADO -->
  <text x="100" y="900"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="125"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="-2">
    PROTOCOLO NÃO
  </text>
  <text x="100" y="1030"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="125"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="-2">
    ENCONTRADO
  </text>

  <!-- 7. Subtitle (in two lines, clean monospace, with red accent on "Fodida") -->
  <text x="100" y="1130"
        font-family="'Courier New', Consolas, monospace"
        font-size="48"
        fill="#FFFFFF"
        letter-spacing="0">
    <tspan>Por Que Sua Geração Está </tspan><tspan fill="#D7263D" font-weight="700" dx="8">Fodida</tspan>
  </text>
  <text x="100" y="1200"
        font-family="'Courier New', Consolas, monospace"
        font-size="48"
        fill="#FFFFFF"
        letter-spacing="0">
    e O Que Fazer Com Isso
  </text>

  <!-- 8. Author — bottom centered, well above bleed edge -->
  <text x="612.5" y="1700"
        font-family="'Courier New', Consolas, monospace"
        font-size="44"
        font-weight="700"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="6">
    FELIPE S.
  </text>
</svg>
