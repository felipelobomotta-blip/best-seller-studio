    <rect x="500" y="1445" width="1500" height="2" fill="#FFFFFF" opacity="0.07"/>
    <rect x="0" y="1500" width="320" height="2" fill="#FFFFFF" opacity="0.10"/>
    <rect x="400" y="1555" width="1700" height="3" fill="#FFFFFF" opacity="0.08"/>
    <rect x="1700" y="1640" width="600" height="3" fill="#FFFFFF" opacity="0.12"/>
    <rect x="100" y="1690" width="600" height="2" fill="#FFFFFF" opacity="0.07"/>
    <rect x="500" y="1790" width="725" height="2" fill="#FFFFFF" opacity="0.06"/>
    <rect x="1700" y="1790" width="700" height="2" fill="#FFFFFF" opacity="0.06"/>
  </g>
  <rect width="2531" height="1850" fill="url(#vignette)"/>
  <text x="100" y="180" font-family="'Courier New',monospace" font-size="28" font-weight="700" fill="#D7263D" letter-spacing="3">LOG: cont. //  ERR_CONTINUOUS</text>
  <text x="100" y="270" font-family="'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="400" fill="#FFFFFF">
    <tspan x="100" dy="0">Doze vezes Felipe Lobo Motta deitou numa maca, recebeu</tspan>
    <tspan x="100" dy="36">anestesia e acordou depois de uma descarga elétrica no</tspan>
    <tspan x="100" dy="36">próprio cérebro. A promessa era simples: melhorar.</tspan>
  </text>
  <text x="100" y="450" font-family="'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Ele não melhorou do jeito que esperavam.</text>
  <text x="100" y="530" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="400" fill="#E8E8E8">
    <tspan x="100" dy="0">Antes vieram a primeira crise de pânico, os remédios, os</tspan>
    <tspan x="100" dy="32">diagnósticos, a busca espiritual, a obsessão por produtividade,</tspan>
    <tspan x="100" dy="32">a tentativa de virar uma pessoa nova e a fantasia de que em</tspan>
    <tspan x="100" dy="32">algum lugar existia um protocolo definitivo para consertar a</tspan>
    <tspan x="100" dy="32">própria vida.</tspan>
  </text>
  <text x="100" y="720" font-family="'Courier New',monospace" font-size="30" font-weight="700" fill="#D7263D">Não existia.</text>
  <text x="100" y="800" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="400" fill="#E8E8E8">
    <tspan x="100" dy="0">Protocolo Não Encontrado é um memoir ácido, vulnerável e</tspan>
    <tspan x="100" dy="32">brutalmente honesto sobre saúde mental, geração millennial,</tspan>
    <tspan x="100" dy="32">família, trabalho, religião, amor, vergonha e a falência da</tspan>
    <tspan x="100" dy="32">promessa de que basta encontrar o método certo para finalmente</tspan>
    <tspan x="100" dy="32">funcionar.</tspan>
  </text>
  <text x="100" y="990" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="400" fill="#E8E8E8">
    <tspan x="100" dy="0">Este livro não promete cura. Não vende rotina perfeita. Não</tspan>
    <tspan x="100" dy="32">transforma sofrimento em palestra motivacional.</tspan>
  </text>
  <text x="100" y="1108" font-family="'Helvetica Neue',Arial,sans-serif" font-size="26" font-style="italic" font-weight="400" fill="#FFFFFF">
    <tspan x="100" dy="0">É sobre continuar vivo quando a vida não entrega uma</tspan>
    <tspan x="100" dy="36">explicação bonita.</tspan>
  </text>
  <line x1="100" y1="1240" x2="700" y2="1240" stroke="#D7263D" stroke-width="2"/>
  <text x="100" y="1290" font-family="'Courier New',monospace" font-size="22" font-weight="700" fill="#D7263D" letter-spacing="6">SOBRE O AUTOR</text>
  <text x="100" y="1340" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#E8E8E8">
    <tspan x="100" dy="0">FELIPE LOBO MOTTA escreve sobre tecnologia, comportamento,</tspan>
    <tspan x="100" dy="28">trabalho, saúde mental e os efeitos invisíveis de viver tentando</tspan>
    <tspan x="100" dy="28">acompanhar uma época acelerada demais. Este livro nasce da</tspan>
    <tspan x="100" dy="28">fricção entre experiência pessoal, colapso geracional e a busca</tspan>
    <tspan x="100" dy="28">por uma vida menos automática.</tspan>
  </text>
  <text x="100" y="1700" font-family="'Courier New',monospace" font-size="16" font-weight="700" fill="#FFFFFF" opacity="0.6" letter-spacing="4">RELATO PESSOAL  //  SAÚDE MENTAL  //  ANTI-AUTOAJUDA</text>
  <rect x="775" y="1535" width="400" height="240" fill="#FFFFFF"/>
  <line x1="1225" y1="100" x2="1225" y2="1750" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15"/>
  <line x1="1306" y1="100" x2="1306" y2="1750" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15"/>
  <g transform="translate(1265.5, 925) rotate(90)">
    <text x="0" y="-10" font-family="'Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">PROTOCOLO NÃO ENCONTRADO</text>
    <circle cx="0" cy="14" r="3" fill="#D7263D"/>
    <text x="0" y="48" font-family="'Courier New',monospace" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="6">FELIPE LOBO MOTTA</text>
  </g>
  <text x="2431" y="180" font-family="'Courier New',monospace" font-size="34" font-weight="700" text-anchor="end" fill="#FFFFFF" letter-spacing="3">PROTOCOLO N. 000.000/ERR</text>
  <text x="1381" y="900" font-family="'Helvetica Neue',Arial,sans-serif" font-size="125" font-weight="700" fill="#FFFFFF" letter-spacing="-2">PROTOCOLO NÃO</text>
  <text x="1381" y="1030" font-family="'Helvetica Neue',Arial,sans-serif" font-size="125" font-weight="700" fill="#FFFFFF" letter-spacing="-2">ENCONTRADO</text>
  <text x="1381" y="1130" font-family="'Courier New',monospace" font-size="48" fill="#FFFFFF"><tspan>Por Que Sua Geração Está </tspan><tspan fill="#D7263D" font-weight="700" dx="8">Fodida</tspan></text>
  <text x="1381" y="1190" font-family="'Courier New',monospace" font-size="48" fill="#FFFFFF">e O Que Fazer Com Isso</text>
  <text x="1906" y="1700" font-family="'Courier New',monospace" font-size="40" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="6">FELIPE LOBO MOTTA</text>
</svg>
